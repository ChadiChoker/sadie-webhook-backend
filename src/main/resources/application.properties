spring.application.name=sadie-webhook-backend

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/sadie_db
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Sadie secret (override with SADIE_CLIENT_SERVER_SECRET env var)
sadie.secret=${SADIE_CLIENT_SERVER_SECRET:test-secret}

server.port=8080
